<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="css/dashboard.css">
    <script src="js/dashboard.js" defer></script>
    <title>Save Money - Dashboard</title>
</head>
<body>

    <div class="sidebar">
        <img src="img/savemoney_icon.png" alt="Logo">
        <a href="#">🏠 Visão Geral</a>
        <a href="#">💸 Transações</a>
        <a href="#">📊 Relatórios</a>
        <a href="#">⚙️ Configurações</a>
        <a class="logout-btn" onclick="logout()">Sair do Sistema</a>
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Olá, <span id="user-name-display">Usuário</span>! 👋</h1>
            <p>Seu painel financeiro</p>
        </div>

        <div class="cards-grid">
            <div class="card">
                <h3>Saldo Atual</h3>
                <p>R$ 0,00</p>
            </div>
            <div class="card green">
                <h3>Receitas (Mês)</h3>
                <p>+ R$ 0,00</p>
            </div>
            <div class="card red">
                <h3>Despesas (Mês)</h3>
                <p>- R$ 0,00</p>
            </div>
        </div>
    </div>
</body>
</html>
