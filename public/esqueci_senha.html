<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="css/login.css">
    <title>Save Money - Esqueci a Senha</title>
</head>
<body>

    <div id="login-screen">
        <div class="login-left">
            <img class="avatar-img" src="img/icon_pessoa.png" alt="Avatar">
            
            <form class="login-form" id="recovery-form" onsubmit="return handleRecovery(event)">
                <h3 style="text-align: center; color: #333; margin-bottom: 20px;">Recuperar Senha</h3>
                <p style="text-align: center; font-size: 14px; color: #666; margin-bottom: 20px;">
                    Digite seu e-mail cadastrado. Enviaremos um link para você redefinir sua senha.
                </p>

                <div class="input-wrapper">
                    <input type="email" id="email-recovery" placeholder="Seu e-mail">
                    <span class="error-msg" id="email-error">Por favor, insira um e-mail válido</span>
                </div>
                
                <span class="error-msg" id="status-msg" style="text-align: center; margin-bottom: 15px; font-weight: bold;"></span>

                <button type="submit" class="btn-green">Enviar Link</button>
                <button type="button" class="btn-outline" onclick="window.location.href='login.html'">Voltar ao Login</button>
            </form>
        </div>
        
        <div class="login-right">
            <img class="logo-img" src="img/savemoney_logo.png" alt="SAVE Money Logo">
            <h2 class="welcome-title">CALMA!</h2>
            <p class="welcome-subtitle">VAMOS AJUDAR VOCÊ<br>A RECUPERAR SEU ACESSO</p>
        </div>
    </div>

    <script>
        function handleRecovery(event) {
            event.preventDefault();
            const emailInput = document.getElementById('email-recovery');
            const statusMsg = document.getElementById('status-msg');

            if (emailInput.value.trim() === '') {
                emailInput.classList.add('invalid');
                document.getElementById('email-error').style.display = 'block';
            } else {
                emailInput.classList.remove('invalid');
                document.getElementById('email-error').style.display = 'none';
                
                // 1. Mostra a mensagem de carregamento
                statusMsg.style.color = "#333";
                statusMsg.innerText = "Enviando e-mail, aguarde...";
                statusMsg.style.display = 'block';

                // 2. Faz a requisição para o PHP
                fetch('../backend/api/recuperar_senha.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: emailInput.value })
                })
                .then(response => response.json())
                .then(data => {
                    // 3. Trata a resposta do servidor
                    if (data.status === 'success') {
                        statusMsg.style.color = "#32c54a"; // Fica verde em caso de sucesso
                        statusMsg.innerText = data.message;
                        emailInput.value = ''; // Limpa o campo para o usuário
                    } else {
                        statusMsg.style.color = "#ff4757"; // Fica vermelho em caso de erro
                        statusMsg.innerText = data.message;
                    }
                })
                .catch(error => {
                    console.error("Erro na requisição:", error);
                    statusMsg.style.color = "#ff4757";
                    statusMsg.innerText = "Erro ao comunicar com o servidor. Verifique o console.";
                });
            }
        }

        // Limpa a mensagem ao digitar novamente
        document.getElementById('email-recovery').addEventListener('input', function() {
            this.classList.remove('invalid');
            document.getElementById('email-error').style.display = 'none';
            document.getElementById('status-msg').style.display = 'none';
        });
    </script>
</body>
</html>
