<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="css/login.css">
    <script src="js/nova_senha.js" defer></script>
    <title>Save Money - Nova Senha</title>
</head>
<body>

    <div id="login-screen">
        <div class="login-left">
            <img class="avatar-img" src="img/icon_pessoa.png" alt="Avatar">
            
            <form class="login-form" onsubmit="return handleNewPassword(event)">
                <h3 style="text-align: center; color: #333; margin-bottom: 20px;">Criar Nova Senha</h3>

                <div class="input-wrapper">
                    <input type="password" id="new-pass" placeholder="Nova senha">
                    <span class="error-msg" id="pass-error">Preencha este campo</span>
                </div>
                <div class="input-wrapper">
                    <input type="password" id="confirm-pass" placeholder="Confirme a nova senha">
                    <span class="error-msg" id="confirm-error">As senhas não coincidem</span>
                </div>
                
                <span class="error-msg" id="status-msg" style="text-align: center; margin-bottom: 15px; font-weight: bold;"></span>

                <button type="submit" class="btn-green">Salvar Senha</button>
            </form>
        </div>
        
        <div class="login-right">
            <img class="logo-img" src="img/savemoney_logo.png" alt="SAVE Money Logo">
            <h2 class="welcome-title">QUASE LÁ!</h2>
            <p class="welcome-subtitle">CRIE UMA NOVA SENHA<br>SEGURA PARA SUA CONTA</p>
        </div>
    </div>
</body>
</html>
